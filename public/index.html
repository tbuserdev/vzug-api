<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0f1419" />
    <title>V-Zug Display Clock Controller</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="control-panel">
      <header class="panel-header">
        <div class="brand-block">
          <div class="brand-indicator"></div>
          <h1 class="brand-title">V-Zug Clock</h1>
          <div class="model-code">Unofficial Controller</div>
        </div>
        <div class="status-lights">
          <div class="status-light" id="power-light"></div>
          <div class="status-light" id="network-light"></div>
        </div>
      </header>

      <main class="control-section">
        <div class="section-title">DISPLAY CONTROL</div>
        
        <!-- Current State Display -->
        <div class="state-display" id="current-state">
          <div class="state-header">
            <div class="state-label">CURRENT STATE</div>
            <div class="state-indicator" id="state-indicator">
              <div class="indicator-dot"></div>
              <span class="indicator-text">Loading...</span>
            </div>
          </div>
          <div class="state-details">
            <div class="state-detail">
              <span class="detail-label">Visibility:</span>
              <span class="detail-value" id="visibility-value">--</span>
            </div>
            <div class="state-detail">
              <span class="detail-label">Last Action:</span>
              <span class="detail-value" id="action-value">--</span>
            </div>
            <div class="state-detail">
              <span class="detail-label">Updated:</span>
              <span class="detail-value" id="updated-value">--</span>
            </div>
          </div>
        </div>
        
        <div class="control-grid">
          <div class="control-group">
            <div class="control-label">Visibility</div>
            <div class="button-pair">
              <button class="control-btn primary" id="show">
                <span class="btn-icon">◉</span>
                <span class="btn-text">SHOW</span>
              </button>
              <button class="control-btn secondary" id="hide">
                <span class="btn-icon">◎</span>
                <span class="btn-text">HIDE</span>
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-label">State Toggle</div>
            <div class="button-pair">
              <button class="control-btn active" id="toggle-on">
                <span class="btn-icon">▲</span>
                <span class="btn-text">TRUE</span>
              </button>
              <button class="control-btn inactive" id="toggle-off">
                <span class="btn-icon">▼</span>
                <span class="btn-text">FALSE</span>
              </button>
            </div>
          </div>
        </div>

        <div class="status-display" id="status" aria-live="polite">
          <div class="status-label">SYSTEM RESPONSE</div>
          <div class="status-value">Awaiting command...</div>
        </div>
      </main>

      <footer class="panel-footer">
        <div class="footer-grid">
          <div class="footer-item">
            <span class="footer-label">API</span>
            <span class="footer-value">Local Endpoint</span>
          </div>
          <div class="footer-item">
            <span class="footer-label">VERSION</span>
            <span class="footer-value">v1.0.0</span>
          </div>
          <div class="footer-item">
            <span class="footer-label">STATUS</span>
            <span class="footer-value online">● ONLINE</span>
          </div>
        </div>
      </footer>
    </div>
    
    <div class="background-grid"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
